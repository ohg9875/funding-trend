name: 주간 펀딩 트렌드 리포트

on:
  schedule:
    - cron: "0 0 * * MON"   # 매주 월요일 00:00 UTC = 09:00 KST
  workflow_dispatch: {}       # 수동 실행 버튼

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # docs/ git push 권한
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 20 deprecation 경고 억제

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: |
          playwright install --with-deps chromium

      - name: 파이프라인 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/run_pipeline.py

      - name: GitHub Pages 배포
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/deploy_pages.py

      - name: 결과물 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/processed/ data/reports/
          git diff --staged --quiet || git commit -m "chore: 주간 리포트 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
