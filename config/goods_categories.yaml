# 상품 유형 분류 사전
# preprocessor.py에서 rapidfuzz.fuzz.partial_ratio >= 80 임계값으로 제목 매칭
# 여러 카테고리에 매칭되면 keywords 목록 순서 우선 (먼저 매칭된 것 선택)
# 매칭 없으면 goods_type: "기타"

categories:
  키링:
    keywords: ["키링", "key ring", "keyring", "키홀더", "key holder"]
    goods_type: "키링"

  아크릴:
    keywords: ["아크릴", "아크릴 스탠드", "아크릴판", "아크릴 키링"]
    goods_type: "아크릴 굿즈"

  에코백:
    keywords: ["에코백", "에코 백", "토트백", "캔버스백", "canvas bag"]
    goods_type: "에코백"

  문구:
    keywords: ["노트", "다이어리", "포스트잇", "스티커", "메모지", "엽서", "포카",
               "포토카드", "마스킹테이프", "마테", "클리어파일", "브로마이드"]
    goods_type: "문구류"

  의류:
